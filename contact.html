  <style>
    :root{--bg:#0a0f1a;--bg-card:rgba(13,21,38,0.8);--text:#fff;--text-secondary:#94A5C7;--border:rgba(0,119,255,0.2);--primary:#0077FF;--secondary:#00C7BE;--accent:#5856D6}
    [data-theme="light"]{--bg:#f0f4f8;--bg-card:rgba(255,255,255,0.75);--text:#0f172a;--text-secondary:#475569;--border:rgba(0,119,255,0.12)}

    body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC','Inter',sans-serif;overflow-x:hidden;transition:background .4s,color .4s}
    a{text-decoration:none;color:inherit}

    .nav-wrap{position:fixed;top:0;left:0;right:0;z-index:50;transition:background .3s,backdrop-filter .3s}

    .nav-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:72px}
    .nav-logo{display:flex;align-items:center;gap:12px}

    .nav-logo-icon svg{width:22px;height:22px;color:#fff}
    .nav-logo-text{font-size:18px;font-weight:700}
    .nav-logo-sub{font-size:11px;color:var(--text-secondary);letter-spacing:1px}
    .nav-links{display:flex;align-items:center;gap:32px}
    .nav-links a{font-size:14px;color:var(--text-secondary);transition:color .2s}
    .nav-links a:hover,.nav-links a.active{color:var(--primary)}
    .nav-phone{display:flex;align-items:center;gap:6px;color:var(--primary);font-weight:600;font-size:14px}
    .nav-phone svg{width:16px;height:16px}
    .theme-btn{width:38px;height:38px;border-radius:10px;border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--bg-card);color:var(--primary);transition:all .2s}
    .theme-btn:hover{transform:scale(1.1)}
    .theme-btn svg{width:18px;height:18px}
    .mobile-menu-btn{display:none;background:none;border:none;color:var(--text);cursor:pointer}
    .mobile-menu-btn svg{width:24px;height:24px}
    .section{position:relative;padding:70px 24px}
    .section-inner{max-width:1200px;margin:0 auto}
    .page-hero{padding:110px 24px 40px;text-align:center}
    .page-hero h1{font-size:clamp(32px,4vw,48px);font-weight:700;margin-bottom:16px}
    .page-hero p{font-size:16px;color:var(--text-secondary);max-width:600px;margin:0 auto}
    .section-label{font-size:12px;color:var(--primary);font-weight:600;letter-spacing:3px;text-transform:uppercase;margin-bottom:12px}
    .footer{padding:40px 24px;border-top:1px solid var(--border)}
    .footer-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:24px}
    .footer-links{display:flex;gap:24px}
    .footer-links a{font-size:13px;color:var(--text-secondary);transition:color .2s}
    .footer-links a:hover{color:var(--primary)}
    .footer-copy{font-size:13px;color:var(--text-secondary)}
    .mobile-menu{position:fixed;top:0;right:0;bottom:0;width:280px;background:var(--bg);border-left:1px solid var(--border);z-index:100;transform:translateX(100%);transition:transform .3s;padding:80px 32px 32px}
    .mobile-menu.open{transform:translateX(0)}
    .mobile-menu a{display:block;font-size:18px;padding:12px 0;color:var(--text-secondary)}
    .mobile-close{position:absolute;top:24px;right:24px;background:none;border:none;color:var(--text);cursor:pointer}
    .mobile-close svg{width:24px;height:24px}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99;display:none}
    .overlay.show{display:block}
    /* Contact Page */
    .contact-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-bottom:48px}
    .contact-card{padding:40px 28px;border-radius:16px;text-align:center;background:var(--bg-card);border:1px solid var(--border);transition:all .3s}
    .contact-card:hover{transform:translateY(-6px);border-color:rgba(0,119,255,0.4);box-shadow:0 8px 32px rgba(0,119,255,0.08)}
    .contact-icon{width:64px;height:64px;border-radius:16px;margin:0 auto 24px;display:flex;align-items:center;justify-content:center}
    .contact-icon svg{width:32px;height:32px}
    .contact-card h3{font-size:18px;font-weight:700;margin-bottom:12px}
    .contact-card .detail{color:var(--text-secondary);font-size:15px}
    .contact-card a{color:var(--primary);font-weight:600;font-size:18px}
    .contact-card a:hover{text-decoration:underline}
    .contact-form-card{background:var(--bg-card);border:1px solid var(--border);border-radius:20px;padding:48px;max-width:800px;margin:0 auto}
    .contact-form-card h3{font-size:24px;font-weight:700;margin-bottom:8px;text-align:center}
    .contact-form-card p{text-align:center;color:var(--text-secondary);margin-bottom:32px}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
    .form-group{display:flex;flex-direction:column;gap:8px}
    .form-group.full{grid-column:1/-1}
    .form-group label{font-size:14px;font-weight:600}
    .form-group input,.form-group textarea,.form-group select{
      padding:14px 16px;border-radius:10px;border:1px solid var(--border);
      background:var(--bg);color:var(--text);font-size:14px;font-family:inherit;
      transition:border-color .2s;outline:none;resize:vertical;
    }
    .form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--primary)}
    .form-group textarea{min-height:120px}
    .form-submit{
      display:block;width:100%;margin-top:24px;padding:16px;border-radius:12px;
      background:linear-gradient(135deg,var(--primary),#0055DD);color:#fff;
      font-size:16px;font-weight:700;border:none;cursor:pointer;
      transition:all .2s;font-family:inherit;
    }
    .form-submit:hover{transform:scale(1.02);box-shadow:0 0 30px rgba(0,119,255,0.3)}
    .map-section{margin-top:64px;border-radius:16px;overflow:hidden;border:1px solid var(--border);height:300px;background:var(--bg-card);display:flex;align-items:center;justify-content:center}
    .map-section svg{width:48px;height:48px;color:var(--text-secondary);opacity:0.3}
    .map-label{text-align:center;margin-top:16px;color:var(--text-secondary);font-size:14px}

    /* ===== Advanced Textures ===== */
    .grid-bg {
      position: fixed; inset: 0;
      background-image: 
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(circle at center, black, transparent 80%);
      pointer-events: none; z-index: 1; opacity: 0.3;
    }
    .noise-overlay {
      position: fixed; inset: 0;
      z-index: 9999; pointer-events: none; opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    @media (max-width: 768px) {
      .grid-bg { background-size: 20px 20px; }
    }
  </style>
</head>
<body>

  <script>
    lucide.createIcons();
    var toggle=document.getElementById('theme-toggle'),iconSun=document.getElementById('icon-sun'),iconMoon=document.getElementById('icon-moon');
    function setTheme(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('theme',t);iconSun.style.display=t==='dark'?'block':'none';iconMoon.style.display=t==='dark'?'none':'block'}
    toggle.addEventListener('click',function(){setTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark')});
    setTheme(localStorage.getItem('theme')||'dark');
    var navbar=document.getElementById('navbar');window.addEventListener('scroll',function(){navbar.classList.toggle('scrolled',scrollY>50)});
    var menuOpen=document.getElementById('menu-open'),menuClose=document.getElementById('menu-close'),mm=document.getElementById('mobile-menu'),ov=document.getElementById('overlay');
    function openM(){mm.classList.add('open');ov.classList.add('show')}function closeM(){mm.classList.remove('open');ov.classList.remove('show')}
    menuOpen.addEventListener('click',openM);menuClose.addEventListener('click',closeM);ov.addEventListener('click',closeM);
    mm.querySelectorAll('a').forEach(function(a){a.addEventListener('click',closeM)});

    // --- Advanced Magnetic System ---
    const magnetTargets = document.querySelectorAll('.nav-logo, .nav-links a, .theme-btn, .mobile-menu-btn, .contact-card, .contact-form-card, .form-submit');
    magnetTargets.forEach(el => {
      el.addEventListener('mousemove', e => {
        const rect = el.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        const deltaX = (e.clientX - centerX) * 0.3;
        const deltaY = (e.clientY - centerY) * 0.3;
        el.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
        if (el.classList.contains('contact-form-card') || el.classList.contains('contact-card')) {
          const rotateX = (centerY - e.clientY) / 25;
          const rotateY = (e.clientX - centerX) / 25;
          el.style.transform += ` perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        }
      });
      el.addEventListener('mouseleave', () => {
        el.style.transform = 'translate(0, 0)';
      });
    });
  </script>
