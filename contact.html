<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在线咨询 - 山东恒派智能科技有限公司</title>
  <meta name="description" content="联系恒派智能科技，获取水处理设备解决方案。电话：400-888-8888">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { inter: ['Inter', 'sans-serif'] },
          colors: {
            brand: { 50:'#eff6ff',100:'#dbeafe',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8' }
          }
        }
      }
    }
  </script>
  <style>
    * { font-family: 'Inter', sans-serif; }
    :root {
      --bg-page: #ffffff;
      --text-page: #1E293B;
      --bg-card: #ffffff;
      --border-card: #e5e7eb;
      --bg-nav: rgba(255,255,255,0.85);
    }
    html.dark {
      --bg-page: #0F172A;
      --text-page: #F1F5F9;
      --bg-card: #1E293B;
      --border-card: #334155;
      --bg-nav: rgba(15,23,42,0.85);
    }
    body { background: var(--bg-page); color: var(--text-page); transition: background 0.3s, color 0.3s; }
    .card { background: var(--bg-card); border-color: var(--border-card); transition: background 0.3s, border-color 0.3s; }
    nav { background: var(--bg-nav); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-color: var(--border-card); transition: background 0.3s; }
    footer { background: var(--bg-card); border-color: var(--border-card); transition: background 0.3s, border-color 0.3s; }
    input, textarea, select { background: var(--bg-card); color: var(--text-page); border-color: var(--border-card); }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <nav class="fixed top-0 left-0 right-0 z-50 border-b">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-blue-600 flex items-center justify-center">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="white"><path d="M8 1l6 3.5v7L8 15l-6-3.5v-7L8 1z"/></svg>
          </div>
          <span class="font-bold text-lg" style="color: var(--text-page)">恒派智能科技</span>
        </div>
        <div class="hidden md:flex items-center gap-8">
          <a href="index.html" class="text-sm font-medium hover:text-blue-600 transition-colors" style="color: var(--text-page); opacity:0.7">首页</a>
          <a href="products.html" class="text-sm font-medium hover:text-blue-600 transition-colors" style="color: var(--text-page); opacity:0.7">产品中心</a>
          <a href="about.html" class="text-sm font-medium hover:text-blue-600 transition-colors" style="color: var(--text-page); opacity:0.7">关于我们</a>
          <a href="news.html" class="text-sm font-medium hover:text-blue-600 transition-colors" style="color: var(--text-page); opacity:0.7">新闻动态</a>
          <a href="contact.html" class="text-sm font-medium hover:text-blue-600 transition-colors" style="color:#2563EB">在线咨询</a>
        </div>
        <button id="themeToggle" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
          <svg id="sunIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <svg id="moonIcon" class="hidden" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </div>
  </nav>

  <section class="pt-24 pb-16 px-4" style="background:linear-gradient(135deg,#eff6ff,#dbeafe)">
    <div class="max-w-4xl mx-auto text-center">
      <h1 class="text-4xl md:text-5xl font-bold mb-4" style="color:#1E293B">在线咨询</h1>
      <p class="text-lg" style="color:#475569">我们的工程师将为您提供最合适的水处理解决方案</p>
    </div>
  </section>

  <section class="py-16 px-4">
    <div class="max-w-5xl mx-auto">
      <div class="grid md:grid-cols-2 gap-12">
        <!-- Contact Info -->
        <div>
          <h2 class="text-2xl font-bold mb-6" style="color:var(--text-page)">联系方式</h2>
          <div class="space-y-6">
            <div class="flex gap-4">
              <div class="flex-shrink-0 w-12 h-12 rounded-xl flex items-center justify-center" style="background:#eff6ff">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" stroke="#2563EB" stroke-width="2"/><circle cx="12" cy="10" r="3" stroke="#2563EB" stroke-width="2"/></svg>
              </div>
              <div>
                <h3 class="font-semibold mb-1" style="color:var(--text-page)">公司地址</h3>
                <p class="text-sm" style="color:var(--text-page);opacity:0.6">山东省临沂市兰山区</p>
                <p class="text-sm" style="color:var(--text-page);opacity:0.6">专注磁分离技术水处理设备研发制造</p>
              </div>
            </div>
            <div class="flex gap-4">
              <div class="flex-shrink-0 w-12 h-12 rounded-xl flex items-center justify-center" style="background:#f5f3ff">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z" stroke="#7C3AED" stroke-width="2"/></svg>
              </div>
              <div>
                <h3 class="font-semibold mb-1" style="color:var(--text-page)">联系电话</h3>
                <p class="text-sm" style="color:var(--text-page);opacity:0.6">400-888-8888</p>
                <p class="text-sm" style="color:var(--text-page);opacity:0.6">7×24小时服务热线</p>
              </div>
            </div>
            <div class="flex gap-4">
              <div class="flex-shrink-0 w-12 h-12 rounded-xl flex items-center justify-center" style="background:#ecfdf5">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" stroke="#059669" stroke-width="2"/><path d="M22 6l-10 7L2 6" stroke="#059669" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </div>
              <div>
                <h3 class="font-semibold mb-1" style="color:var(--text-page)">电子邮箱</h3>
                <p class="text-sm" style="color:var(--text-page);opacity:0.6">info@sdhengpai.com</p>
              </div>
            </div>
            <div class="flex gap-4">
              <div class="flex-shrink-0 w-12 h-12 rounded-xl flex items-center justify-center" style="background:#ecfeff">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#0891B2" stroke-width="2"/><path d="M12 6v6l4 2" stroke="#0891B2" stroke-width="2" stroke-linecap="round"/></svg>
              </div>
              <div>
                <h3 class="font-semibold mb-1" style="color:var(--text-page)">服务时间</h3>
                <p class="text-sm" style="color:var(--text-page);opacity:0.6">周一至周六 8:30-17:30</p>
              </div>
            </div>
          </div>

          <!-- Map Placeholder -->
          <div class="mt-8 rounded-2xl border overflow-hidden h-48 flex items-center justify-center" style="background:#f1f5f9">
            <div class="text-center">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" class="mx-auto mb-2" style="opacity:0.3"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" stroke="#64748b" stroke-width="2"/><circle cx="12" cy="10" r="3" stroke="#64748b" stroke-width="2"/></svg>
              <p class="text-sm" style="color:#94a3b8">山东省临沂市兰山区</p>
            </div>
          </div>
        </div>

        <!-- Contact Form -->
        <div>
          <h2 class="text-2xl font-bold mb-6" style="color:var(--text-page)">填写咨询表单</h2>
          <form class="card rounded-2xl border p-8 space-y-5" onsubmit="handleSubmit(event)">
            <div>
              <label class="block text-sm font-medium mb-2" style="color:var(--text-page)">您的姓名 <span style="color:#ef4444">*</span></label>
              <input type="text" name="name" required placeholder="请输入您的姓名" class="w-full px-4 py-3 rounded-xl border focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
            </div>
            <div>
              <label class="block text-sm font-medium mb-2" style="color:var(--text-page)">联系电话 <span style="color:#ef4444">*</span></label>
              <input type="tel" name="phone" required placeholder="请输入您的手机号" class="w-full px-4 py-3 rounded-xl border focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
            </div>
            <div>
              <label class="block text-sm font-medium mb-2" style="color:var(--text-page)">电子邮箱</label>
              <input type="email" name="email" placeholder="请输入您的邮箱（选填）" class="w-full px-4 py-3 rounded-xl border focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
            </div>
            <div>
              <label class="block text-sm font-medium mb-2" style="color:var(--text-page)">您感兴趣的产品</label>
              <select name="product" class="w-full px-4 py-3 rounded-xl border focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                <option value="">请选择产品（选填）</option>
                <option value="磁絮凝分离设备">磁絮凝分离设备</option>
                <option value="高密度沉淀池">高密度沉淀池</option>
                <option value="精密过滤器">精密过滤器</option>
                <option value="零排放膜工艺">零排放膜工艺</option>
                <option value="UV紫外线消毒">UV紫外线消毒</option>
                <option value="反硝化深床滤池">反硝化深床滤池</option>
                <option value="整体解决方案">整体解决方案</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium mb-2" style="color:var(--text-page)">咨询内容 <span style="color:#ef4444">*</span></label>
              <textarea name="message" required rows="4" placeholder="请描述您的水处理需求，包括水质情况、处理规模等" class="w-full px-4 py-3 rounded-xl border focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm resize-none"></textarea>
            </div>
            <button type="submit" class="w-full py-3 rounded-xl font-semibold text-white transition-all hover:shadow-lg" style="background:#2563EB">
              提交咨询
            </button>
            <p class="text-xs text-center" style="color:var(--text-page);opacity:0.4">提交后我们的工程师将在24小时内与您联系</p>
          </form>
          <div id="successMsg" class="card rounded-2xl border p-8 text-center hidden">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" class="mx-auto mb-4"><circle cx="12" cy="12" r="10" stroke="#059669" stroke-width="2"/><path d="M8 12l3 3 5-6" stroke="#059669" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <h3 class="text-lg font-bold mb-2" style="color:var(--text-page)">提交成功！</h3>
            <p class="text-sm" style="color:var(--text-page);opacity:0.6">感谢您的咨询，我们的工程师将在24小时内与您联系。</p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer class="mt-auto py-10 px-4">
    <div class="max-w-7xl mx-auto">
      <div class="border-t pt-6 text-center text-sm" style="color:var(--text-page);opacity:0.4">
        <p>© 2025 山东恒派智能科技有限公司 版权所有</p>
      </div>
    </div>
  </footer>

  <script>
    const toggle = document.getElementById('themeToggle');
    const html = document.documentElement;
    const sunIcon = document.getElementById('sunIcon');
    const moonIcon = document.getElementById('moonIcon');
    if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      html.classList.add('dark');
      sunIcon.classList.add('hidden');
      moonIcon.classList.remove('hidden');
    } else {
      html.classList.remove('dark');
      sunIcon.classList.remove('hidden');
      moonIcon.classList.add('hidden');
    }
    toggle.addEventListener('click', () => {
      html.classList.toggle('dark');
      const isDark = html.classList.contains('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      if (isDark) { sunIcon.classList.add('hidden'); moonIcon.classList.remove('hidden'); }
      else { sunIcon.classList.remove('hidden'); moonIcon.classList.add('hidden'); }
    });

    function handleSubmit(e) {
      e.preventDefault();
      const form = e.target;
      const successMsg = document.getElementById('successMsg');
      form.style.display = 'none';
      successMsg.classList.remove('hidden');
    }
  </script>
</body>
</html>
