<section class="pb-16"><div class="container"><div class="grid lg:grid-cols-2 gap-12"><div><div class="aspect-[4/3] rounded-3xl overflow-hidden shadow-xl relative" id="hero-carousel"><div class="carousel-track" style="display:flex;transition:transform 0.5s ease;"><img src="images/high-precision-filter-1.jpg" alt="转鼓式精密过滤器" class="w-full h-full object-cover flex-shrink-0" style="width:100%;"><img src="images/high-precision-filter-2.jpg" alt="转鼓式精密过滤器" class="w-full h-full object-cover flex-shrink-0" style="width:100%;"></div><button class="carousel-btn carousel-prev" onclick="moveSlide(-1)" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.5);border:none;border-radius:50%;width:40px;height:40px;cursor:pointer;color:white;display:flex;align-items:center;justify-content:center;z-index:10;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button><button class="carousel-btn carousel-next" onclick="moveSlide(1)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.5);border:none;border-radius:50%;width:40px;height:40px;cursor:pointer;color:white;display:flex;align-items:center;justify-content:center;z-index:10;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button><div class="carousel-dots" style="position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:10;"><span class="dot active" onclick="goToSlide(0)" style="width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.5);cursor:pointer;"></span><span class="dot" onclick="goToSlide(1)" style="width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.5);cursor:pointer;"></span></div></div></div><div><h1 class="text-4xl font-display mb-4">转鼓式<span class="gradient-text">精密过滤器</span></h1><p class="text-lg text-muted-foreground mb-8">多级过滤系统组合，可去除水中悬浮物、胶体物质等，确保出水水质稳定达到排放标准或回用要求。</p><a href="contact.html" class="btn-primary">获取报价</a></div></div></div></section>
<footer class="py-8 border-t text-center text-sm text-muted-foreground"><p>&copy; 2026 山东恒派智能科技有限公司</p></footer>
<script>let currentSlide=0;const track=document.querySelector('.carousel-track');const dots=document.querySelectorAll('.carousel-dots .dot');const totalSlides=2;function updateCarousel(){track.style.transform='translateX(-'+(currentSlide*100)+'%)';dots.forEach((d,i)=>d.style.background=i===currentSlide?'white':'rgba(255,255,255,0.5)');}function moveSlide(n){currentSlide=(currentSlide+n+totalSlides)%totalSlides;updateCarousel();}function goToSlide(n){currentSlide=n;updateCarousel();}setInterval(()=>moveSlide(1),3000);</script>
